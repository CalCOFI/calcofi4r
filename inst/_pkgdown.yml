url: https://calcofi.io/calcofi4r
template:
  bootstrap: 5
  includes:
    in_header: |
      <!-- Google tag (gtag.js) -->
      <script async src="https://www.googletagmanager.com/gtag/js?id=G-0HVK8TDMCF"></script>
      <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-0HVK8TDMCF');
      </script>
navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [schema, query, docs, search, github]
  components:
    schema:
      text: Schema
      href: https://calcofi.io/schema/
      aria-label: CalCOFI Schema explorer (ERD, tables, columns, units)
    query:
      text: Query
      href: https://calcofi.io/query/
      aria-label: CalCOFI Query (browser DuckDB-WASM)
    docs:
      text: Docs
      href: https://calcofi.io/docs/
      aria-label: CalCOFI Docs
reference:
- title: "Read"
  desc: functions reading data, particularly from the CalCOFI API
  contents:
  - has_concept("read")
- title: "Analyze"
  desc: functions for analyzing data
  contents:
  - has_concept("analyze")
- title: "Visualize"
  desc: functions for visualizing data
  contents:
  - has_concept("visualize")
- title: "Data"
  desc: small lookup and example datasets not requiring API access
  contents:
  - has_concept("data")
- title: "Database"
  desc: functions specific to database (Admin only)
  contents:
  - has_concept("database")
- title: "Other"
  desc: check for other functions or datasets not captured by above categories
  contents:
  - lacks_concepts(c("read", "analyze", "visualize", "data", "database"))
